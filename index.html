<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ancen's Secret Base 🐾</title>
    
    <link href="https://lib.baomitu.com/quill/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://lib.baomitu.com/quill/1.3.6/quill.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --f-bg: #fffcfd; 
            --f-accent: #ffb1c1; 
            --f-glass: rgba(255, 255, 255, 0.88); 
            --f-text-main: #4a4a4a; 
        }

        body { 
            background-color: var(--f-bg); 
            background-image: url('https://www.transparenttextures.com/patterns/sakura.png');
            background-repeat: repeat; 
            background-attachment: fixed; 
            color: var(--f-text-main);
            font-family: 'Noto Sans SC', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
            cursor: url('ani1053.cur'), auto !important;
        }

        .preview-container {
            white-space: pre-wrap !important; 
            display: -webkit-box !important; 
            -webkit-box-orient: vertical; 
            -webkit-line-clamp: 3; 
            line-height: 1.6; 
            overflow: hidden;
            text-overflow: ellipsis;
            word-break: break-all;
        }

        .f-card {
            background: var(--f-glass); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.8); 
            border-radius: 30px;
            box-shadow: 0 8px 30px rgba(255, 177, 193, 0.08);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .f-card:hover { transform: translateY(-4px); }

        #pet-container { position: fixed; bottom: 20px; right: 20px; z-index: 999; }
        #pet-bubble { 
            position: absolute; bottom: 100%; right: 0; margin-bottom: 10px;
            background: white; padding: 10px 15px; border-radius: 18px; font-size: 11px;
            opacity: 0; transition: 0.4s; border: 1px solid #fef0f3;
            box-shadow: 0 5px 15px rgba(255,177,193,0.2); white-space: nowrap;
            pointer-events: none;
        }
        #pet-img { width: 85px; animation: softFloat 4s ease-in-out infinite; }
        @keyframes softFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .music-playing { animation: rotate 3s linear infinite; color: #ffb1c1; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .page-btn { padding: 8px 20px; border-radius: 15px; font-size: 12px; transition: 0.3s; border: 1px solid #ffdee9; color: #ffb1c1; background: white; }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed !important; }

        .loading-spin { border: 2px solid #f3f3f3; border-top: 2px solid #ffb1c1; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        a, button, [onclick], .cursor-pointer {
            cursor: url('ani767.cur'), pointer !important;
        }
    </style>
</head>
<body>
<audio id="bgm" loop preload="auto" src="music/bgm.mp3"></audio>
<div id="music-ctrl" onclick="toggleMusic()" style="position: fixed; top: 30px; right: 30px; z-index: 1001; width: 44px; height: 44px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(255,177,193,0.3); border: 1px solid #fff0f3;">🎵</div>

<div id="page-list">
    <div class="header-banner" style="height: 220px; background: linear-gradient(to bottom, #ffdee9cc, #ffffff22), url('https://api.paugram.com/wallpaper?source=gh') center/cover no-repeat; border-radius: 0 0 50px 50px;"></div>
    
    <div class="max-w-6xl mx-auto px-4 sm:px-8 -mt-12 relative pb-24">
        <div class="flex flex-col lg:flex-row gap-8">
            <aside class="w-full lg:w-64">
                <div class="f-card p-6 text-center sticky top-8">
                    <img src="images/IMG_3024.webp" class="w-20 h-20 rounded-full mx-auto mb-4 object-cover border-2 border-pink-50">
                    <h2 class="nickname mb-1 font-bold text-gray-700">Ancenchan</h2>
                    <div class="text-[11px] text-gray-400 mb-6">这里记录碎碎念和星海的歌声 ✨</div>
                    
                    <div class="text-left text-[10px] text-pink-200 tracking-widest mb-3 uppercase font-bold">Collection</div>
                    <nav id="tagCloud" class="flex flex-col gap-1 mb-6"></nav>
                    
                    <div class="text-left text-[10px] text-pink-200 tracking-widest mb-3 uppercase font-bold">Connect</div>
                    <div class="flex flex-col gap-1 text-left text-[11px] text-gray-400 mb-6">
                        <a href="https://space.bilibili.com/330870" target="_blank" class="bg-blue-50/40 p-2 rounded-xl hover:bg-blue-100/50 transition-colors block">📺 Bili: 安尘子 (330870)</a>
                        <div class="bg-pink-50/40 p-2 rounded-xl">🎨 WB: kurofu</div>
                        <div class="bg-red-50/40 p-2 rounded-xl">📖 XHS: 1166142003</div>
                    </div>

                    <div class="text-left text-[10px] text-pink-200 tracking-widest mb-3 uppercase font-bold">Tools</div>
                    <div class="flex flex-col gap-1 text-left text-[11px] text-gray-400">
                        <a href="https://bakabakamiao.streamlit.app/" target="_blank" class="bg-blue-50/40 p-2 rounded-xl hover:bg-blue-100/50 transition-colors block">✨ 表情包分割工具</a>
                        <a href="https://ancenchan.github.io/bakautaten/index.html" target="_blank" class="bg-purple-50/40 p-2 rounded-xl hover:bg-purple-100/50 transition-colors block">❤️ 专属歌词查找工具</a>
                    </div>
                </div>
            </aside>

            <main class="flex-1">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xs text-pink-200 tracking-widest font-bold uppercase">Memory Stream</h3>
                    <button onclick="checkAdminThenOpen()" class="bg-white px-5 py-2 rounded-2xl border border-pink-100 text-pink-400 text-sm shadow-sm hover:bg-pink-400 hover:text-white transition-all font-medium">NEW MEMORY ✨</button>
                </div>
                
                <div id="diaryList" class="space-y-6"></div>

                <div class="flex justify-center items-center gap-6 mt-12">
                    <button id="prevPage" onclick="changePage(-1)" class="page-btn">← Previous</button>
                    <span id="pageInfo" class="text-xs text-pink-200 font-bold">Page 1</span>
                    <button id="nextPage" onclick="changePage(1)" class="page-btn">Next →</button>
                </div>
            </main>
        </div>
    </div>
</div>

<div id="page-detail" class="hidden p-4 sm:p-8">
    <div class="max-w-4xl mx-auto pt-8">
        <button onclick="goBack()" class="mb-8 text-pink-300 text-sm tracking-widest font-bold">/ BACK</button>
        <div id="detail-card" class="f-card p-8 sm:p-16 bg-white/95 shadow-xl min-h-[450px]">
            <div id="detail-loading" class="flex flex-col items-center justify-center h-64 text-pink-200 hidden">
                <div class="loading-spin mb-4"></div>
                <span class="text-[10px] tracking-[0.2em]">ACCESSING STARSEA...</span>
            </div>
            <div id="detail-actual-content"></div>
        </div>
    </div>
</div>

<div id="editor-mask" class="fixed inset-0 bg-white/80 backdrop-blur-md z-[1000] hidden items-center justify-center p-4">
    <div class="f-card p-8 w-full max-w-2xl bg-white shadow-2xl">
        <input id="diaryTitle" type="text" placeholder="Title..." class="w-full text-xl mb-2 outline-none border-b border-pink-50 pb-2 font-medium">
        <input id="diaryTags" type="text" placeholder="Tags (e.g. Life, Music)..." class="w-full text-xs mb-4 outline-none text-pink-300 italic bg-transparent">
        <div id="editor-container" style="height: 350px;"></div>
        <div class="flex gap-3 mt-8">
            <button id="saveBtn" onclick="handleSave()" class="flex-1 py-4 bg-pink-400 text-white rounded-2xl font-bold shadow-lg uppercase tracking-wider">Sync to Starsea</button>
            <button onclick="document.getElementById('editor-mask').style.display='none'" class="px-6 py-4 bg-gray-100 text-gray-400 rounded-2xl uppercase font-bold">Cancel</button>
        </div>
    </div>
</div>

<div id="pet-container" onclick="petSpeak()">
    <div id="pet-bubble"></div>
    <img id="pet-img" src="images/IMG_2877.png" alt="Pet">
</div>

<script>
    const REPO = "Ancenchan/ancenchan.github.io";
    const LIST_PATH = "data/list.json";
    const POSTS_DIR = "data/posts";
    
    let diaryList = [], listSha = "", filterTag = null, editIndex = null, currentPage = 1;
    const pageSize = 6;
    const kohaneQuotes = ["我会努力唱好的！", "这就是……街头音乐吗？", "哪怕害羞，我也想传达心情！", "大家都在努力，我也不能落后！", "谢谢你一直陪着我 ✨"];
    
    const quill = new Quill('#editor-container', {
        theme: 'snow',
        modules: {
            toolbar: {
                container: [['bold', 'italic'], ['image', 'link'], [{ 'header': [2, 3, false] }]],
                handlers: {
                    image: function() {
                        const range = quill.getSelection();
                        const input = document.createElement('input');
                        input.setAttribute('type', 'file');
                        input.setAttribute('accept', 'image/*');
                        input.click();
                        input.onchange = async () => {
                            const file = input.files[0];
                            if (!file) return;
                            petSpeak("正在同步星海进度... ☁️");
                            const url = await uploadToGithub(file);
                            if (url) {
                                petSpeak("同步成功！100% 🌟");
                                const index = range ? range.index : quill.getLength();
                                quill.insertEmbed(index, 'image', url);
                            } else {
                                petSpeak("同步失败 😿");
                            }
                        };
                    }
                }
            }
        }
    });

    async function fetchCloudData() {
        const t = localStorage.getItem('gh_token'), h = t ? { 'Authorization': `Bearer ${t}` } : {};
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${LIST_PATH}?v=${Date.now()}`, { headers: h });
            if (res.ok) { 
                const data = await res.json(); 
                listSha = data.sha; 
                diaryList = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\s/g, ''))))); 
                render(); 
            } else { diaryList = []; render(); }
        } catch (e) { petSpeak("Connect Error"); }
    }

    async function uploadToGithub(file) {
        const t = localStorage.getItem('gh_token');
        if (!t) { alert("请先设置 Token"); return null; }
        const fileName = `img_${Date.now()}.png`;
        const path = `images/posts/${fileName}`;
        const reader = new FileReader();
        const base64Promise = new Promise(resolve => {
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.readAsDataURL(file);
        });
        const content = await base64Promise;
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${t}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Upload: ${fileName}`, content: content })
            });
            return res.ok ? `https://raw.githubusercontent.com/${REPO}/main/images/posts/${fileName}` : null;
        } catch (e) { return null; }
    }

    function render() {
        const listEl = document.getElementById('diaryList'), cloud = document.getElementById('tagCloud'), tagMap = {};
        diaryList.forEach(d => d.tags && d.tags.forEach(t => tagMap[t] = (tagMap[t] || 0) + 1));
        
        cloud.innerHTML = Object.keys(tagMap).map(t => `
            <button class="text-[11px] text-left p-2 rounded-xl transition-all ${filterTag===t?'bg-pink-100 text-pink-500 font-bold':'text-gray-400 hover:bg-white'}" onclick="setFilter('${t}')">🌸 ${t} (${tagMap[t]})</button>
        `).join('');

        const sorted = diaryList.slice().sort((a,b) => (a.pinned===b.pinned) ? b.id-a.id : (a.pinned?-1:1));
        const filtered = filterTag ? sorted.filter(d => d.tags && d.tags.includes(filterTag)) : sorted;
        
        const totalPages = Math.ceil(filtered.length / pageSize) || 1;
        const start = (currentPage - 1) * pageSize;
        const pagedData = filtered.slice(start, start + pageSize);

        listEl.innerHTML = pagedData.map((item) => {
            const realIndex = diaryList.findIndex(d => d.id === item.id);
            return `
            <div class="f-card p-6 sm:p-8 cursor-pointer group hover:bg-white" onclick="showDetail(${realIndex})">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[10px] text-pink-200 font-bold">${item.pinned?'<span class="text-pink-400">★ PINNED</span> · ':''}${item.date}</span>
                    <div class="flex gap-1">${(item.tags||[]).map(t => `<span class="text-[8px] bg-pink-50 text-pink-300 px-2 py-0.5 rounded-lg font-medium">${t}</span>`).join('')}</div>
                </div>
                <h2 class="text-lg font-medium text-gray-700 mb-3 group-hover:text-pink-400 transition-colors">${item.title}</h2>
                <div class="preview-container text-gray-400 text-sm">${item.summary || '...'}</div>
            </div>`;
        }).join('');

        document.getElementById('pageInfo').innerText = `Page ${currentPage} / ${totalPages}`;
        document.getElementById('prevPage').disabled = (currentPage === 1);
        document.getElementById('nextPage').disabled = (currentPage === totalPages);
    }

    async function showDetail(index) {
        editIndex = index;
        const item = diaryList[index];
        const loading = document.getElementById('detail-loading');
        const actual = document.getElementById('detail-actual-content');
        
        document.getElementById('page-list').classList.add('hidden');
        document.getElementById('page-detail').classList.remove('hidden');
        loading.classList.remove('hidden');
        actual.innerHTML = '';
        window.scrollTo(0, 0);

        try {
            const t = localStorage.getItem('gh_token'), h = t ? { 'Authorization': `Bearer ${t}` } : {};
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${POSTS_DIR}/${item.id}.json?v=${Date.now()}`, { headers: h });
            if (res.ok) {
                const data = await res.json();
                const contentObj = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\s/g, '')))));
                loading.classList.add('hidden');
                const safeContent = btoa(unescape(encodeURIComponent(contentObj.content)));
                actual.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-[10px] text-pink-200 font-bold">${item.pinned?'★ PINNED · ':''}${item.date}</span>
                        <div class="flex gap-2">${(item.tags||[]).map(t => `<span class="text-[9px] bg-pink-50 text-pink-400 px-3 py-1 rounded-full">#${t}</span>`).join('')}</div>
                    </div>
                    <h1 class="text-2xl font-bold text-gray-800 mb-8">${item.title}</h1>
                    <div class="ql-editor p-0 text-gray-700 leading-8 text-[15px]">${contentObj.content}</div>
                    <div class="mt-12 pt-8 border-t border-pink-50 flex gap-6 items-center">
                        <button onclick="handlePin()" class="text-pink-400 text-xs font-bold uppercase tracking-widest">${item.pinned?'UNPIN':'PIN'}</button>
                        <button onclick="prepareEdit('${safeContent}')" class="text-pink-400 text-xs font-bold uppercase tracking-widest">EDIT</button>
                        <button onclick="handleDelete()" class="text-red-300 text-xs font-bold uppercase tracking-widest">DELETE</button>
                        <button onclick="goBack()" class="text-gray-300 text-xs font-bold uppercase tracking-widest ml-auto">CLOSE</button>
                    </div>`;
            } else { throw new Error(); }
        } catch (e) {
            loading.classList.add('hidden');
            actual.innerHTML = `<div class="text-center py-20 text-gray-400">Content file not found.</div>`;
        }
    }

    async function handlePin() {
        const t = getToken();
        if (!t) return;
        const item = diaryList[editIndex];
        item.pinned = !item.pinned;
        petSpeak(item.pinned ? "Pinned to the top! 📌" : "Unpinned. ☁️");
        
        try {
            const latest = await fetch(`https://api.github.com/repos/${REPO}/contents/${LIST_PATH}?v=${Date.now()}`, { headers: { 'Authorization': `Bearer ${t}` } });
            if (latest.ok) { const d = await latest.json(); listSha = d.sha; }

            const listBody = btoa(unescape(encodeURIComponent(JSON.stringify(diaryList, null, 2))));
            await fetch(`https://api.github.com/repos/${REPO}/contents/${LIST_PATH}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${t}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Toggle Pin", content: listBody, sha: listSha })
            });
            showDetail(editIndex);
            render();
        } catch (e) { alert("Pin failed"); }
    }

    async function handleSave() {
        const title = document.getElementById('diaryTitle').value;
        const tagsInput = document.getElementById('diaryTags').value;
        const fullContent = quill.root.innerHTML;
        const t = localStorage.getItem('gh_token');
        
        if(!title || fullContent === "<p><br></p>") return alert("Empty!");
        if(!t) return getToken();

        const btn = document.getElementById('saveBtn');
        btn.innerText = "SYNCING..."; btn.disabled = true;

        const tags = tagsInput.split(/[\s,，]+/).filter(t => t.trim() !== "");
        const id = editIndex !== null ? diaryList[editIndex].id : Date.now();
        const date = editIndex !== null ? diaryList[editIndex].date : new Date().toLocaleDateString();
        const summary = quill.getText(0, 100).trim() + (quill.getLength() > 100 ? '...' : '');
        const pinned = editIndex !== null ? (diaryList[editIndex].pinned || false) : false;

        try {
            let postSha = "";
            try {
                const checkPost = await fetch(`https://api.github.com/repos/${REPO}/contents/${POSTS_DIR}/${id}.json`, { headers: { 'Authorization': `Bearer ${t}` } });
                if (checkPost.ok) { const d = await checkPost.json(); postSha = d.sha; }
            } catch (e) {}

            const contentBody = btoa(unescape(encodeURIComponent(JSON.stringify({ content: fullContent }))));
            await fetch(`https://api.github.com/repos/${REPO}/contents/${POSTS_DIR}/${id}.json`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${t}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Post ${id}`, content: contentBody, sha: postSha })
            });

            const latestList = await fetch(`https://api.github.com/repos/${REPO}/contents/${LIST_PATH}?v=${Date.now()}`, { headers: { 'Authorization': `Bearer ${t}` } });
            if (latestList.ok) { const d = await latestList.json(); listSha = d.sha; }

            if(editIndex !== null) { diaryList[editIndex] = { id, title, tags, date, summary, pinned }; }
            else { diaryList.unshift({ id, title, tags, date, summary, pinned: false }); }

            const listBody = btoa(unescape(encodeURIComponent(JSON.stringify(diaryList, null, 2))));
            const listUpdateRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${LIST_PATH}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${t}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Update List", content: listBody, sha: listSha })
            });

            if(listUpdateRes.ok) {
                document.getElementById('editor-mask').style.display = 'none';
                editIndex = null; render();
                if(!document.getElementById('page-detail').classList.contains('hidden')) goBack();
                petSpeak("Synced to Starsea! 🐾");
            }
        } catch (e) { alert("Sync failed: " + e.message); }
        btn.innerText = "Sync to Starsea"; btn.disabled = false;
    }

    async function handleDelete() {
        const t = getToken();
        if (!t || !confirm("Erase this memory forever?")) return;
        diaryList.splice(editIndex, 1);
        try {
            const latest = await fetch(`https://api.github.com/repos/${REPO}/contents/${LIST_PATH}?v=${Date.now()}`, { headers: { 'Authorization': `Bearer ${t}` } });
            if (latest.ok) { const d = await latest.json(); listSha = d.sha; }
            const listBody = btoa(unescape(encodeURIComponent(JSON.stringify(diaryList, null, 2))));
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${LIST_PATH}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${t}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Delete post", content: listBody, sha: listSha })
            });
            if (res.ok) { petSpeak("Memory erased. 🌌"); setTimeout(() => { goBack(); render(); }, 1000); }
        } catch (e) { alert("Delete failed"); }
    }

    function prepareEdit(encodedContent) {
        try {
            const originalContent = decodeURIComponent(escape(atob(encodedContent)));
            openEditor(originalContent);
        } catch (e) { petSpeak("读取失败... 😿"); }
    }

    function openEditor(savedContent = "") {
        if(!getToken()) return;
        document.getElementById('editor-mask').style.display = 'flex';
        if(editIndex !== null) {
            const item = diaryList[editIndex];
            document.getElementById('diaryTitle').value = item.title;
            document.getElementById('diaryTags').value = (item.tags || []).join(', ');
            quill.root.innerHTML = savedContent; 
        } else {
            document.getElementById('diaryTitle').value = "";
            document.getElementById('diaryTags').value = "";
            quill.root.innerHTML = "";
        }
    }

    function toggleMusic() {
        const bgm = document.getElementById('bgm'), ctrl = document.getElementById('music-ctrl');
        bgm.paused ? (bgm.play(), ctrl.classList.add('music-playing')) : (bgm.pause(), ctrl.classList.remove('music-playing'));
    }

    function petSpeak(msg) {
        const b = document.getElementById('pet-bubble');
        b.innerText = msg || kohaneQuotes[Math.floor(Math.random() * kohaneQuotes.length)];
        b.style.opacity = "1"; setTimeout(() => b.style.opacity = "0", 5000);
    }

    function goBack() { 
        document.getElementById('page-list').classList.remove('hidden'); 
        document.getElementById('page-detail').classList.add('hidden'); 
        editIndex = null; 
    }

    function setFilter(tag) { filterTag = (filterTag === tag) ? null : tag; currentPage = 1; render(); }
    function changePage(dir) { currentPage += dir; render(); window.scrollTo(0, 400); }
    function getToken() { 
        let t = localStorage.getItem('gh_token'); 
        if(!t){ t = prompt("GitHub Token:"); if(t) localStorage.setItem('gh_token', t); } 
        return t; 
    }
    function checkAdminThenOpen() { editIndex = null; openEditor(); }

    window.onload = fetchCloudData;
</script>
</body>
</html>
