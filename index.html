<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ancen的秘密基地 🌸</title>
    <link href="https://lib.baomitu.com/quill/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://lib.baomitu.com/quill/1.3.6/quill.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        :root { --f-bg: #fffafa; --f-pink: #ffb1c1; --f-text: #7d6b6b; }
        html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
        body { background-color: var(--f-bg); color: var(--f-text); font-family: 'Noto Sans SC', sans-serif; margin: 0; }
        .f-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 8px 25px rgba(255, 177, 193, 0.1); transition: 0.3s; }
        .f-card:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(255, 177, 193, 0.2); }
        .header-banner { height: 280px; background: url('https://api.paugram.com/wallpaper?source=gh') center/cover no-repeat; border-radius: 0 0 40px 40px; }
        .tag-pill { display: flex; align-items: center; justify-content: space-between; padding: 8px 15px; margin-bottom: 6px; border-radius: 12px; background: white; font-size: 13px; transition: 0.2s; border: 1px solid #fff1f3; cursor: pointer; }
        .tag-pill.active { background: #fff1f3; color: var(--f-pink); border-color: var(--f-pink); }
        #editor-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .f-editor-box { width: 90%; max-width: 600px; background: white; border-radius: 30px; padding: 25px; box-shadow: 0 20px 60px rgba(255, 183, 197, 0.3); }
        #editor-container { height: 180px; font-size: 16px; border-radius: 15px; border: 1px solid #eee !important; }
        .moe-btn { background: linear-gradient(135deg, #ffb1c1 0%, #ff8fa3 100%); color: white; padding: 10px 25px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; }
        #page-detail { display: none; min-height: 100vh; padding: 40px 20px; }
        .preview-text { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; opacity: 0.7; }
    </style>
</head>
<body>

<div id="page-list">
    <div class="header-banner"></div>
    <div class="max-w-6xl mx-auto px-6 -mt-16 pb-20">
        <div class="flex flex-col lg:flex-row gap-8">
            <aside class="w-full lg:w-64 shrink-0">
                <div class="sticky top-10 space-y-6">
                    <div class="f-card p-6 text-center">
                        <img src="https://api.btstu.cn/sjtx/api.php?lx=a1&format=jpg" class="w-20 h-20 rounded-2xl mx-auto mb-4 object-cover">
                        <h2 class="text-xl font-bold" style="font-family: 'ZCOOL KuaiLe'">Ancen</h2>
                        <button onclick="openEditor()" class="moe-btn w-full my-4 text-sm">🖋️ 记录新的羁绊</button>
                        <div id="tagCloud" class="text-left space-y-1"></div>
                    </div>
                </div>
            </aside>
            <main class="flex-1 lg:mt-10 space-y-6" id="diaryList"></main>
        </div>
    </div>
</div>

<div id="page-detail">
    <div class="max-w-2xl mx-auto">
        <button onclick="goBack()" class="mb-6 text-pink-300 font-bold hover:underline">⬅ 返回传送门</button>
        <div id="detail-box" class="f-card p-10 bg-white/90"></div>
    </div>
</div>

<div id="editor-mask">
    <div class="f-editor-box">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-pink-400">🧸 捕获灵感中...</h3>
            <button onclick="closeEditor()" class="text-2xl text-gray-300">&times;</button>
        </div>
        <input id="diaryTitle" type="text" placeholder="起个名字喵" class="w-full text-lg font-bold mb-3 outline-none border-none border-b">
        <input id="diaryTags" type="text" placeholder="分类 (逗号隔开)" class="w-full text-xs mb-3 outline-none border-none text-pink-300">
        <div id="editor-container"></div>
        <div class="flex justify-end mt-5">
            <button id="saveBtn" onclick="handleSave()" class="moe-btn">同步到星海 🚀</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/gh/stevenjoezhang/live2d-widget@latest/autoload.js"></script>

<script>
    const REPO = "Ancenchan/ancenchan.github.io"; 
    const PATH = "data/articles.json";
    let diaryData = [];
    let currentSha = "";
    let filterTag = null;

    const quill = new Quill('#editor-container', { theme: 'snow', modules: { toolbar: [['bold', 'italic'], ['image']] } });

    function openEditor() { 
        if(!localStorage.getItem('gh_token')) return configToken();
        document.getElementById('editor-mask').style.display = 'flex'; 
    }
    function closeEditor() { document.getElementById('editor-mask').style.display = 'none'; }
    function configToken() { 
        const t = prompt("🗝️ 请输入次元密钥 (Token):");
        if(t) { localStorage.setItem('gh_token', t.trim()); location.reload(); }
    }

    // 改进：强制 No-Cache 获取 SHA
    async function getLatestData() {
        const token = localStorage.getItem('gh_token');
        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${PATH}?nocache=${Date.now()}`, {
            headers: { 
                'Authorization': `Bearer ${token}`,
                'Cache-Control': 'no-cache',
                'Pragma': 'no-cache'
            }
        });
        if (res.ok) {
            const data = await res.json();
            currentSha = data.sha;
            // 改进：更稳健的 Base64 解码
            const binaryStr = window.atob(data.content.replace(/\s/g, ''));
            const bytes = new Uint8Array(binaryStr.length);
            for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
            return JSON.parse(new TextDecoder().decode(bytes));
        }
        return null;
    }

    async function fetchCloudData() {
        const data = await getLatestData();
        if(data) { diaryData = data; render(); }
    }

    function render() {
        const list = document.getElementById('diaryList');
        const cloud = document.getElementById('tagCloud');
        const tagMap = {};
        diaryData.forEach(d => { if(d.tags) d.tags.forEach(t => tagMap[t] = (tagMap[t] || 0) + 1); });
        cloud.innerHTML = `<div class="tag-pill ${!filterTag?'active':''}" onclick="setFilter(null)"><span>✦ 全部</span><span>${diaryData.length}</span></div>` + 
            Object.keys(tagMap).map(t => `<div class="tag-pill ${filterTag===t?'active':''}" onclick="setFilter('${t}')"><span>✦ ${t}</span><span>${tagMap[t]}</span></div>`).join('');
        const filtered = filterTag ? diaryData.filter(d => d.tags && d.tags.includes(filterTag)) : diaryData;
        list.innerHTML = filtered.slice().reverse().map((item, index) => {
            const realIndex = diaryData.length - 1 - index;
            const pureText = item.content.replace(/<[^>]+>/g, '').substring(0, 80);
            return `<div class="f-card p-8 cursor-pointer mb-6" onclick="showDetail(${realIndex})">
                <div class="text-[10px] text-pink-200 mb-2 font-bold">${item.date}</div>
                <h2 class="text-xl font-bold text-gray-700 mb-3">${item.title || '无名之书'}</h2>
                <p class="preview-text text-sm text-gray-400">${pureText}...</p>
                <div class="mt-4 text-pink-300 text-xs font-bold">查看全文 >></div>
            </div>`;
        }).join('');
    }

    function showDetail(index) {
        const item = diaryData[index];
        document.getElementById('detail-box').innerHTML = `<div class="text-[10px] text-pink-200 mb-4 font-bold">${item.date}</div>
            <h1 class="text-2xl font-bold text-gray-700 mb-8">${item.title}</h1>
            <div class="ql-editor p-0 text-gray-600 leading-relaxed">${item.content}</div>
            <div class="mt-10 border-t pt-6 flex flex-wrap gap-2">
                ${(item.tags||[]).map(t => `<span class="bg-pink-50 px-3 py-1 rounded-full text-[10px] text-pink-300">#${t}</span>`).join('')}
                <button onclick="deleteItem(${index})" class="ml-auto text-red-200 text-xs hover:text-red-400">封印此页</button>
            </div>`;
        document.getElementById('page-list').style.display = 'none';
        document.getElementById('page-detail').style.display = 'block';
        window.scrollTo(0,0);
    }

    function goBack() { document.getElementById('page-list').style.display = 'block'; document.getElementById('page-detail').style.display = 'none'; }
    function setFilter(tag) { filterTag = tag; render(); }

    // 核心改进：同步函数
    async function handleSave() {
        const content = quill.root.innerHTML;
        const title = document.getElementById('diaryTitle').value.trim();
        const tags = document.getElementById('diaryTags').value.split(/[,，]/).map(t => t.trim()).filter(t => t);
        if(!content || content === '<p><br></p>') return;

        const btn = document.getElementById('saveBtn');
        btn.innerText = "正在穿越时空..."; btn.disabled = true;

        try {
            // 1. 强制拉取最新
            const latest = await getLatestData();
            if(latest) diaryData = latest;

            const newItem = { id: Date.now(), title, content, tags, date: new Date().toLocaleDateString('zh-CN', {year:'numeric', month:'long', day:'numeric'}) };
            const newData = [...diaryData, newItem];

            // 2. 改进：使用安全的 Base64 编码方式
            const uint8 = new TextEncoder().encode(JSON.stringify(newData, null, 2));
            let b64 = "";
            for (let i = 0; i < uint8.length; i++) b64 += String.fromCharCode(uint8[i]);
            const finalContent = window.btoa(b64);

            // 3. 提交
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${PATH}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${localStorage.getItem('gh_token')}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Magic Update", content: finalContent, sha: currentSha })
            });

            if(res.ok) {
                const resData = await res.json();
                currentSha = resData.content.sha;
                diaryData = newData;
                closeEditor();
                render();
                // 清空
                document.getElementById('diaryTitle').value = "";
                document.getElementById('diaryTags').value = "";
                quill.root.innerHTML = "";
            } else {
                const err = await res.json();
                alert("同步失败: " + err.message);
            }
        } catch (e) {
            alert("魔力不足，请稍后再试喵！");
            console.error(e);
        } finally {
            btn.innerText = "同步到星海 🚀"; btn.disabled = false;
        }
    }

    async function deleteItem(index) {
        if(!confirm("真的要封印这段记忆吗？")) return;
        await getLatestData();
        diaryData.splice(index, 1);
        const uint8 = new TextEncoder().encode(JSON.stringify(diaryData, null, 2));
        let b64 = "";
        for (let i = 0; i < uint8.length; i++) b64 += String.fromCharCode(uint8[i]);
        await fetch(`https://api.github.com/repos/${REPO}/contents/${PATH}`, {
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${localStorage.getItem('gh_token')}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: "Delete Page", content: window.btoa(b64), sha: currentSha })
        });
        goBack(); fetchCloudData();
    }

    window.onload = fetchCloudData;
</script>
</body>
</html>
